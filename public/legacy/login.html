<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เข้าสู่ระบบ - Sophon Expire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/forms.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      font-family: "Prompt", Arial, sans-serif;
      color: #0f172a;
      background:
        linear-gradient(90deg, rgba(249, 115, 22, 0.1) 0 1px, transparent 1px 84px),
        linear-gradient(180deg, rgba(255, 255, 255, 0.06) 0 1px, transparent 1px 84px),
        linear-gradient(135deg, #020617 0%, #111827 54%, #f97316 180%);
    }

    .login-shell {
      width: 100%;
      max-width: 980px;
      min-height: 560px;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(380px, 0.95fr);
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: #ffffff;
      box-shadow: 0 30px 80px rgba(2, 6, 23, 0.36);
    }

    .brand-panel {
      display: grid;
      align-content: center;
      gap: 28px;
      padding: 42px;
      color: #ffffff;
      background:
        linear-gradient(180deg, rgba(249, 115, 22, 0.16), transparent 42%),
        linear-gradient(135deg, #020617 0%, #111827 54%, #271089 118%);
    }

    .logo-box {
      width: 132px;
      height: 132px;
      border: 1px solid rgba(249, 115, 22, 0.5);
      box-shadow:
        0 0 0 8px rgba(255, 255, 255, 0.04),
        0 18px 38px rgba(0, 0, 0, 0.32);
      background: #271089;
      overflow: hidden;
    }

    .logo-box img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .kicker {
      display: inline-flex;
      width: fit-content;
      padding: 7px 10px;
      border: 1px solid rgba(249, 115, 22, 0.42);
      background: rgba(249, 115, 22, 0.16);
      color: #fed7aa;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brand-panel h1 {
      margin: 0 0 12px;
      font-size: 42px;
      line-height: 1.05;
    }

    .brand-panel p {
      max-width: 440px;
      margin: 0;
      color: #cbd5e1;
      line-height: 1.75;
    }

    .login-card {
      display: grid;
      align-content: center;
      padding: 42px;
      background: #ffffff;
    }

    .form-head {
      margin-bottom: 22px;
    }

    .form-head .kicker {
      margin-bottom: 12px;
      border-color: #fed7aa;
      background: #fff7ed;
      color: #c2410c;
    }

    .form-head h2 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.2;
    }

    .form-head p {
      margin: 0;
      color: #64748b;
      font-size: 13px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #334155;
      font-size: 12px;
      font-weight: 900;
    }

    input {
      width: 100%;
      height: 46px;
      padding: 0 12px;
      border: 1px solid #d8dee8;
      border-radius: 0;
      background: #f8fafc;
      font-size: 14px;
      font-family: "Prompt", Arial, sans-serif;
    }

    input:focus {
      outline: none;
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.16);
    }

    button {
      width: 100%;
      height: 48px;
      border: 0;
      border-radius: 0;
      background: #f97316;
      color: #ffffff;
      font-size: 15px;
      font-weight: 900;
      font-family: "Prompt", Arial, sans-serif;
      cursor: pointer;
    }

    button:hover {
      background: #c2410c;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .error,
    .success {
      min-height: 18px;
      margin-top: 12px;
      font-size: 13px;
      text-align: center;
    }

    .error { color: #dc2626; }
    .success { color: #059669; }

    .hint {
      margin-top: 14px;
      padding: 10px 12px;
      border: 1px solid #d8dee8;
      background: #f8fafc;
      color: #64748b;
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      body { padding: 0; }

      .login-shell {
        min-height: 100vh;
        grid-template-columns: 1fr;
        border: 0;
      }

      .brand-panel {
        min-height: 260px;
        padding: 28px 22px;
      }

      .logo-box {
        width: 86px;
        height: 86px;
      }

      .brand-panel h1 {
        font-size: 32px;
      }

      .login-card {
        padding: 28px 22px;
      }
    }
  </style>
</head>

<body>
  <main class="login-shell">
    <section class="brand-panel">
      <div class="logo-box">
        <img src="/images/logo.png" alt="Sophon Expire">
      </div>
      <div>
        <div class="kicker">Sophon Driver Style</div>
        <h1>Sophon Expire</h1>
        <p>ระบบติดตามวันหมดอายุ รับเข้า ตัดสต๊อก และตรวจนับสินค้า สำหรับทีมหน้าร้านและคลังสินค้า</p>
      </div>
    </section>

    <section class="login-card">
      <div class="form-head">
        <div class="kicker">เข้าสู่ระบบ</div>
        <h2>ยินดีต้อนรับ</h2>
        <p>กรอกชื่อผู้ใช้และรหัสผ่านเพื่อเริ่มทำงาน</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">ชื่อผู้ใช้</label>
          <input type="text" id="username" autocomplete="username" placeholder="กรอกชื่อผู้ใช้" required>
        </div>

        <div class="form-group">
          <label for="password">รหัสผ่าน</label>
          <input type="password" id="password" autocomplete="current-password" placeholder="กรอกรหัสผ่าน" required>
        </div>

        <button type="submit" id="loginBtn">เข้าสู่ระบบ</button>

        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>
      </form>

      <div class="hint">ระบบจะตรวจสอบชื่อผู้ใช้และรหัสผ่านจากฐานข้อมูล Supabase</div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://uaqljdqtitdpctjxhutv.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_acbHgymVZkSQv0cHco0WWw_2Aipv9hL";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");
    const loginBtn = document.getElementById("loginBtn");

    function setError(message = "") {
      errorMsg.textContent = message;
      successMsg.textContent = "";
    }

    function setSuccess(message = "") {
      successMsg.textContent = message;
      errorMsg.textContent = "";
    }

    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
      loginBtn.textContent = isLoading ? "กำลังเข้าสู่ระบบ..." : "เข้าสู่ระบบ";
    }

    function clearMessages() {
      errorMsg.textContent = "";
      successMsg.textContent = "";
    }

    function getRoleLabel(role) {
      if (role === "admin") return "ผู้ดูแลระบบ";
      if (role === "manager") return "ผู้จัดการ";
      return "ผู้ใช้งาน";
    }

    function saveUserSession(user) {
      localStorage.setItem("user", JSON.stringify({
        id: user.id,
        username: user.username,
        name: user.username,
        role: user.role || "user",
        loginAt: new Date().toISOString()
      }));
    }

    function redirectIfLoggedIn() {
      try {
        const existingUser = JSON.parse(localStorage.getItem("user"));
        if (existingUser && existingUser.username) {
          window.location.href = "dashboard.html";
        }
      } catch (e) {
        localStorage.removeItem("user");
      }
    }

    async function loginWithUsersTable(username, password) {
      const { data, error } = await supabaseClient
        .from("app_users")
        .select("id, username, password, role")
        .eq("username", username)
        .eq("password", password)
        .single();

      if (error || !data) {
        throw new Error("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
      }

      return data;
    }

    form.addEventListener("submit", async function(e) {
      e.preventDefault();
      clearMessages();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        setError("กรุณากรอกชื่อผู้ใช้และรหัสผ่าน");
        return;
      }

      try {
        setLoading(true);
        setSuccess("กำลังตรวจสอบข้อมูล...");

        const user = await loginWithUsersTable(username, password);
        saveUserSession(user);
        setSuccess("เข้าสู่ระบบสำเร็จ (" + getRoleLabel(user.role) + ")");

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 600);
      } catch (err) {
        console.error("Login error:", err);
        setError(err.message || "เกิดข้อผิดพลาดในการเข้าสู่ระบบ");
      } finally {
        setLoading(false);
      }
    });

    redirectIfLoggedIn();
  </script>
</body>
</html>
